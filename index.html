<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YOU ARE AN IDIOT</title>
    <style>
        body {
            background-color: black;
            color: lime;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .snake {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            z-index: 2;
        }
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            text-align: center;
            z-index: 3;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="message">YOU ARE AN IDIOT</div>
    <audio autoplay loop>
        <source src="idiot_sound.mp3" type="audio/mp3">
    </audio>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
        const fontSize = 14;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i]++;
            }
        }

        setInterval(draw, 33);

        // Snake Animation
        const snakeContainer = document.createElement('div');
        snakeContainer.style.position = 'absolute';
        snakeContainer.style.top = '0';
        snakeContainer.style.left = '0';
        snakeContainer.style.width = '100%';
        snakeContainer.style.height = '100%';
        snakeContainer.style.zIndex = '2';
        document.body.appendChild(snakeContainer);

        let snakeInterval;
        function createSnake() {
            const snake = document.createElement('div');
            snake.className = 'snake';
            snake.style.left = `${Math.random() * 100}%`;
            snake.style.top = `${Math.random() * 100}%`;
            snakeContainer.appendChild(snake);

            let posX = parseFloat(snake.style.left);
            let posY = parseFloat(snake.style.top);
            const directionX = (Math.random() - 0.5) * 4;
            const directionY = (Math.random() - 0.5) * 4;

            function moveSnake() {
                posX += directionX;
                posY += directionY;

                if (posX < 0 || posX > 100) directionX *= -1;
                if (posY < 0 || posY > 100) directionY *= -1;

                snake.style.left = `${posX}%`;
                snake.style.top = `${posY}%`;

                setTimeout(moveSnake, 50);
            }

            moveSnake();
        }

        snakeInterval = setInterval(createSnake, 500);

        // Message
        const messages = [
            "YOU ARE STUPID",
            "YOU ARE AN IDIOT",
            "YOU ARE USELESS",
            "YOU ARE A FAILURE",
            "YOU ARE WORTHLESS"
        ];

        setInterval(() => {
            const msg = messages[Math.floor(Math.random() * messages.length)];
            document.querySelector('.message').textContent = msg;
        }, 2000);
    </script>
</body>
</html>
