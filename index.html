
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HACKED BY ALZZ TEAM XNXX</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            margin: 0;
            padding: 0;
            position: relative;
            height: 100vh;
        }
        #matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .snake {
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #0f0;
            border-radius: 50%;
            z-index: 2;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            text-align: center;
            z-index: 3;
            text-shadow: 0 0 10px #0f0;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        #logo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 4;
            font-size: 24px;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
        #sound {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 4;
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="snake" id="snake1"></div>
    <div class="snake" id="snake2"></div>
    <div id="message">HACKED BY ALZZ TEAM XNXX</div>
    <div id="logo">XNXX TEAM</div>
    <audio id="sound" autoplay loop>
        <source src="idiot.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Matrix Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -100;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff00';
            ctx.font = `${fontSize}px monospace`;

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        // Snake Animation
        const snake1 = document.getElementById('snake1');
        const snake2 = document.getElementById('snake2');

        let posX1 = 0, posY1 = 0;
        let posX2 = 0, posY2 = 0;
        let dirX1 = 2, dirY1 = 2;
        let dirX2 = -2, dirY2 = -2;

        function moveSnake() {
            posX1 += dirX1;
            posY1 += dirY1;
            posX2 += dirX2;
            posY2 += dirY2;

            if (posX1 <= 0 || posX1 >= window.innerWidth - 20) dirX1 *= -1;
            if (posY1 <= 0 || posY1 >= window.innerHeight - 20) dirY1 *= -1;
            if (posX2 <= 0 || posX2 >= window.innerWidth - 20) dirX2 *= -1;
            if (posY2 <= 0 || posY2 >= window.innerHeight - 20) dirY2 *= -1;

            snake1.style.left = posX1 + 'px';
            snake1.style.top = posY1 + 'px';
            snake2.style.left = posX2 + 'px';
            snake2.style.top = posY2 + 'px';

            requestAnimationFrame(moveSnake);
        }

        moveSnake();

        // Cyber Message
        const message = document.getElementById('message');
        message.innerHTML = '<span style="color:#ff0000">VINCIT QUI SE VINCIT</span><br><span style="color:#ffff00">YOU HAVE BEEN HACKED</span>';

        // Logo
        const logo = document.getElementById('logo');
        logo.innerHTML = 'XNXX TEAM<br><span style="font-size:16px;">ALZZ CYBER TEAM</span>';
    </script>
</body>
</html>
